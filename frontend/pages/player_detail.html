<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選手詳細</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/player.css">
</head>
<body class="player-page player-page--detail">
  <main class="page">
    <section class="player-page-shell player-detail-shell">
      <div class="player-page-panel player-detail-hero">
        <header class="player-page-header player-page-header--detail">
          <div class="player-detail-hero-main">
            <div class="player-detail-hero-copy">
              <p id="player-detail-school-name" class="player-page-kicker">所属学校を読み込み中...</p>
              <h1 id="player-detail-title" class="player-page-title">選手詳細</h1>
              <p id="player-detail-context" class="player-page-context">選手情報を読み込み中です。</p>
            </div>
            <aside class="player-detail-total-stars" aria-labelledby="player-detail-total-stars-label">
              <p id="player-detail-total-stars-label" class="player-detail-total-stars-label">総合星</p>
              <p id="player-detail-total-stars-value" class="player-detail-total-stars-value">—</p>
              <p id="player-detail-total-stars-meta" class="player-detail-total-stars-meta"></p>
            </aside>
          </div>
          <div id="player-detail-actions" class="player-page-actions"></div>
        </header>
        <div
          id="player-detail-message"
          class="player-message"
          role="alert"
          aria-live="polite"
        ></div>
      </div>
      <div id="player-detail-root" class="player-detail"></div>
    </section>
  </main>
  <div
    id="player-detail-toast-region"
    class="player-toast-region"
    aria-live="polite"
    aria-relevant="additions text"
    aria-atomic="false"
  ></div>
  <script type="module" src="../js/pages/player_detail.js"></script>
</body>
</html>
