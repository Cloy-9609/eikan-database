<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学校詳細</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components/admission_year_picker.css">
  <link rel="stylesheet" href="../css/school_detail.css">
</head>
<body>
  <main class="page">
    <div class="detail-page-header">
      <a class="back-link" href="./schools.html">学校一覧へ戻る</a>
      <div class="detail-page-copy">
        <h1>学校詳細</h1>
        <p class="page-description">確認用のサマリーと編集内容を分けて表示します。</p>
      </div>
    </div>
    <div id="school-detail-root" class="school-detail">
      <section class="detail-section detail-section--summary">
        <div class="section-header section-header--stack">
          <div>
            <h2 class="section-title">学校サマリー</h2>
            <p class="section-description">現在登録されている学校情報を確認します。</p>
          </div>
        </div>
        <div id="school-summary-root"></div>
      </section>

      <section class="detail-section detail-section--progression">
        <div class="section-header section-header--stack">
          <div>
            <h2 class="section-title">年度進行</h2>
            <p class="section-description">
              学校の現在年度と所属選手の学校管理学年を 1 年進めます。snapshot は自動生成されません。
            </p>
          </div>
        </div>
        <div id="school-progression-root"></div>
      </section>

      <section class="detail-section detail-section--edit">
        <div class="section-header section-header--stack">
          <div>
            <h2 class="section-title">学校情報を編集</h2>
            <p class="section-description">
              学校名・都道府県・プレイ方針・開始年度・メモを更新できます。現在年度はこの画面で直接変更しません。
            </p>
          </div>
        </div>
        <div id="school-edit-root"></div>
      </section>

      <section class="detail-section detail-section--players">
        <div class="section-header section-header--players">
          <div>
            <h2 class="section-title">所属選手一覧</h2>
            <p class="section-description">この学校に所属する選手を確認します。</p>
          </div>
          <a class="school-button school-button-secondary" id="player-register-link" href="./player_register.html">
            選手登録
          </a>
        </div>
        <div id="school-players-root"></div>
      </section>
    </div>
  </main>
  <script type="module" src="../js/pages/school_detail.js"></script>
</body>
</html>
